install:
  postgresql: true

global:
  participantId: changeme
  connectorName: null
  defaultStorageClass: default
  security:
    allowInsecureImages: true

namespaceOverride: ""

controlplane:
  image:
    repository: ghcr.io/re4de/connector-controlplane-dcp
    tag: 1.0.2-edc0.14.0
  existingSecret: controlplane-secret
  scheduling:
    label: null
  endpoints:
    default:
      path: /api
      port: 8080
      public: true
    management:
      path: /api/management
      port: 8081
      public: true
    control:
      path: /api/control
      port: 8082
      public: false
    protocol:
      path: /api/v1/dsp
      port: 8083
      public: true
    version:
      path: /api/version
      port: 8085
      public: true
    catalog:
      path: /api/catalog
      port: 8086
      public: true
  service:
    enabled: true
  ingress:
    enabled: true
    host: changeme
    tls:
      enabled: false
      issuer: cert-issuer
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
  edc:
    core:
      retriesMax: 5
      backoffMin: 500
      backoffMax: 10000
      logOnRetry: false
      logOnRetryScheduled: false
      logOnRetriesExceeded: false
      logOnRetryFailedAttempt: false
      logOnRetryAbort: false
    iam:
      didWebHttps: true
      stsUrl: changeme
      stsClientIdOverwrite: null
      stsClientSecretOverwrite: null
      revocationMimetype: application/json
      keyAliasOverwrite: null
      trustedIssuer:
        0:
          id: did:web:dataspace:issuer
          type: ["*"]
    policy:
      reevaluateWait: 30000
      permissionAdministrator:
        url: https://api-nprd.traxes.io/prprd/forwatt/v2
        tokenUrl: https://acc.signin.energy/am/oauth2/realms/root/realms/difesp/access_token
        clientId: changeme
        clientSecretAlias: pm-secret
    http:
      clientHttpsEnforce: false
      clientTimeoutConnect: 30
      clientTimeoutRead: 30
      clientSendBuffer: 0
      clientReceiveBuffer: 0
    vault:
      healthCheck: true
      healthCheckStandBy: false
      healthCheckPath: /v1/sys/health
      tokenScheduledRenew: true
      tokenTTL: 300
      tokenRenewBuffer: 30
      secretPath: /v1/secret
    sql:
      fetchSize: 5000
    registry:
      url: changeme
      apiKey: changeme
    catalog:
      enabled: true
      numberOfCrawlers: 1
      timeBetweenRuns: 3600
      delayUntilStart: 60
    selfRegistration:
      enabled: true
      identityHubRegistration: true
      membershipIssuanceEnabled: true
      ihIdentityUrl: changeme
      ihCredentialUrl: changeme
      issuerDid: did:web:dataspace:issuer

dataplane:
  image:
    repository: ghcr.io/re4de/connector-dataplane
    tag: 1.0.2-edc0.14.0
  scheduling:
    label: null
  endpoints:
    default:
      path: /api
      port: 8080
      public: false
    control:
      path: /api/control
      port: 8082
      public: false
    public:
      path: /api/v2/public
      port: 8084
      public: true
  service:
    enabled: true
  ingress:
    enabled: true
    host: changeme
    tls:
      enabled: false
      issuer: cert-issuer
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
  edc:
    core:
      retriesMax: 5
      backoffMin: 500
      backoffMax: 10000
      logOnRetry: false
      logOnRetryScheduled: false
      logOnRetriesExceeded: false
      logOnRetryFailedAttempt: false
      logOnRetryAbort: false
    http:
      clientHttpsEnforce: false
      clientTimeoutConnect: 30
      clientTimeoutRead: 30
      clientSendBuffer: 0
      clientReceiveBuffer: 0
    vault:
      healthCheck: true
      healthCheckStandBy: false
      healthCheckPath: /v1/sys/health
      tokenScheduledRenew: true
      tokenTTL: 300
      tokenRenewBuffer: 30
      secretPath: /v1/secret
    sql:
      fetchSize: 5000
    token:
      signer:
        privateKey: changeme
        privateKeyAlias: signer-key
      verifier:
        publicKey: changeme
        publicKeyAlias: verifier-key

identityhub:
  enabled: true
  image:
    repository: ghcr.io/re4de/identity-hub
    tag: 1.0.0-edc0.14.0
  scheduling:
    label: null
  endpoints:
    default:
      path: /api
      port: 8080
      public: false
    credentials:
      path: /api/credentials
      port: 8081
      public: true
    identity:
      path: /api/identity
      port: 8082
      public: false
    sts:
      path: /api/sts
      port: 8083
      public: false
    version:
      path: /api/version
      port: 8084
      public: true
    did:
      path: /
      port: 8085
      public: true
  service:
    enabled: true
  ingress:
    enabled: true
    host: changeme
    tls:
      enabled: false
      issuer: cert-issuer
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
  edc:
    core:
      retriesMax: 5
      backoffMin: 500
      backoffMax: 10000
      logOnRetry: false
      logOnRetryScheduled: false
      logOnRetriesExceeded: false
      logOnRetryFailedAttempt: false
      logOnRetryAbort: false
    http:
      clientHttpsEnforce: false
      clientTimeoutConnect: 30
      clientTimeoutRead: 30
      clientSendBuffer: 0
      clientReceiveBuffer: 0
    vault:
      healthCheck: true
      healthCheckStandBy: false
      healthCheckPath: /v1/sys/health
      tokenScheduledRenew: true
      tokenTTL: 300
      tokenRenewBuffer: 30
      secretPath: /v1/secret
    sql:
      fetchSize: 5000
    ih:
      iam:
        didWebHttps: true
      seed:
        superUserKey: c3VwZXItdXNlcg==.changeme

ui:
  enabled: true
  image:
    repository: ghcr.io/re4de/connector-ui
    tag: 1.0.0-edc0.14.0
  service:
    port: 80
  ingress:
    enabled: true
    tls:
      enabled: false
      issuer: cert-issuer

vault:
  enabled: true
  image:
    repository: hashicorp/vault
    tag: 1.18.1
  dev:
    devRootToken: changeme
  persistence:
    size: 8Gi
    volumeName: vault-vol
  extraEnvironmentVars:
    SIGN_ALIAS: signer-key
    VERI_ALIAS: verifier-key
  extraSecretEnvironmentVars:
    - envName: SIGN_KEY
      secretName: vault-secret
      secretKey: signer-key
    - envName: VERI_KEY
      secretName: vault-secret
      secretKey: verifier-key

postgresql:
  image:
    repository: bitnamilegacy/postgresql
  auth:
    username: edc
    database: edc
    existingSecret: postgres-secret
