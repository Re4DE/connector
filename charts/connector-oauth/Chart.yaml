apiVersion: v2
name: connector-oauth
description: |
  A Helm chart for the EDC-based Connector. The Connector will open the door to the Data Space and will
  handle all communication with the other participants and the identity provider. This Connector uses OAuth2
  as Identity Service.

type: application
version: 1.0.0
appVersion: 1.0.0-edc0.14.0

dependencies:
  - name: vault
    version: 0.29.0
    repository: https://helm.releases.hashicorp.com
    condition: install.vault
  - name: postgresql
    version: 16.4.3
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: install.postgresql