apiVersion: v1
kind: Secret
metadata:
  name: vault-secret
  namespace: {{ include "common.namespace" . | quote }}
  labels: {{- include "controlplane.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.controlplane.edc.auth.oauth.certificateAlias }}: {{ .Values.controlplane.edc.auth.oauth.certificate | b64enc }}
  {{ .Values.controlplane.edc.auth.oauth.privateKeyAlias }}: {{ .Values.controlplane.edc.auth.oauth.privateKey | b64enc }}
  {{ .Values.dataplane.edc.token.signer.privateKeyAlias }}: {{ .Values.dataplane.edc.token.signer.privateKey | b64enc }}
  {{ .Values.dataplane.edc.token.verifier.publicKeyAlias }}: {{ .Values.dataplane.edc.token.verifier.publicKey | b64enc }}