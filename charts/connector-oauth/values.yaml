install:
  vault: true
  postgresql: true

global:
  participantId: changeme
  connectorName: changeme
  defaultStorageClass: default
  security:
    allowInsecureImages: true

namespaceOverride: ""

controlplane:
  image:
    repository: ghcr.io/re4de/connector-controlplane-oauth2
    tag: 1.0.0-edc0.14.0
  existingSecret: controlplane-secret
  scheduling:
    label: null
  endpoints:
    default:
      path: /api
      port: 8080
      public: false
    management:
      path: /api/management
      port: 8081
      public: true
    control:
      path: /api/control
      port: 8082
      public: false
    protocol:
      path: /api/v1/dsp
      port: 8083
      public: true
    version:
      path: /api/version
      port: 8085
      public: true
    catalog:
      path: /api/catalog
      port: 8086
      public: true
  service:
    enabled: true
  ingress:
    enabled: true
    host: changeme
    tls:
      enabled: false
      issuer: cert-issuer
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
  edc:
    core:
      retriesMax: 5
      backoffMin: 500
      backoffMax: 10000
      logOnRetry: false
      logOnRetryScheduled: false
      logOnRetriesExceeded: false
      logOnRetryFailedAttempt: false
      logOnRetryAbort: false
    auth:
      oauth:
        tokenUrl: changeme
        jwksUrl: changeme
        providerAudienceOverride: null
        certificate: changeme
        privateKey: changeme
        certificateAlias: auth-cert
        privateKeyAlias: auth-key
    policy:
      reevaluateWait: 30000
      permissionAdministrator:
        url: https://api-nprd.traxes.io/prprd/forwatt/v2
        tokenUrl: https://acc.signin.energy/am/oauth2/realms/root/realms/difesp/access_token
        clientId: changeme
        clientSecretAlias: pm-secret
    http:
      clientHttpsEnforce: false
      clientTimeoutConnect: 30
      clientTimeoutRead: 30
      clientSendBuffer: 0
      clientReceiveBuffer: 0
    vault:
      healthCheck: true
      healthCheckStandBy: false
      healthCheckPath: /v1/sys/health
      tokenScheduledRenew: true
      tokenTTL: 300
      tokenRenewBuffer: 30
      secretPath: /v1/secret
    sql:
      fetchSize: 5000
    registry:
      url: changeme
      apiKey: changeme
    catalog:
      registryEnabled: true
      numberOfCrawlers: 1
      timeBetweenRuns: 3600
      delayUntilStart: 60
    selfRegistration:
      enabled: true

dataplane:
  image:
    repository: ghcr.io/re4de/connector-dataplane
    tag: 1.0.0-edc0.14.0
  scheduling:
    label: null
  endpoints:
    default:
      path: /api
      port: 8080
      public: false
    control:
      path: /api/control
      port: 8082
      public: false
    public:
      path: /api/v2/public
      port: 8084
      public: true
  service:
    enabled: true
  ingress:
    enabled: true
    host: changeme
    tls:
      enabled: false
      issuer: cert-issuer
  startupProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 5
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
  edc:
    core:
      retriesMax: 5
      backoffMin: 500
      backoffMax: 10000
      logOnRetry: false
      logOnRetryScheduled: false
      logOnRetriesExceeded: false
      logOnRetryFailedAttempt: false
      logOnRetryAbort: false
    http:
      clientHttpsEnforce: false
      clientTimeoutConnect: 30
      clientTimeoutRead: 30
      clientSendBuffer: 0
      clientReceiveBuffer: 0
    vault:
      healthCheck: true
      healthCheckStandBy: false
      healthCheckPath: /v1/sys/health
      tokenScheduledRenew: true
      tokenTTL: 300
      tokenRenewBuffer: 30
      secretPath: /v1/secret
    sql:
      fetchSize: 5000
    token:
      signer:
        privateKey: changeme
        privateKeyAlias: signer-key
      verifier:
        publicKey: changeme
        publicKeyAlias: verifier-key

ui:
  enabled: true
  image:
    repository: ghcr.io/re4de/connector-ui
    tag: 1.0.0-edc0.14.0
  service:
    port: 80
  ingress:
    enabled: true
    tls:
      enabled: false
      issuer: cert-issuer

vault:
  injector:
    enabled: false
  server:
    extraEnvironmentVars:
      CERT_ALIAS: auth-cert
      PRIV_ALIAS: auth-key
      SIGN_ALIAS: signer-key
      VERI_ALIAS: verifier-key
    extraSecretEnvironmentVars:
      - envName: CERT
        secretName: vault-secret
        secretKey: auth-cert
      - envName: PRIV_KEY
        secretName: vault-secret
        secretKey: auth-key
      - envName: SIGN_KEY
        secretName: vault-secret
        secretKey: signer-key
      - envName: VERI_KEY
        secretName: vault-secret
        secretKey: verifier-key
    postStart:
      - sh
      - -c
      - |-
        {
        sleep 5
        /bin/vault kv put secret/$CERT_ALIAS content="$CERT"
        /bin/vault kv put secret/$PRIV_ALIAS content="$PRIV_KEY"
        /bin/vault kv put secret/$SIGN_ALIAS content="$SIGN_KEY"
        /bin/vault kv put secret/$VERI_ALIAS content="$VERI_KEY"
        }
    dev:
      enabled: true
      devRootToken: changeme

postgresql:
  image:
    repository: bitnamilegacy/postgresql
  auth:
    username: edc
    database: edc
    existingSecret: postgres-secret
