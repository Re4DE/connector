{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ include "common.namespace" . | quote }}
  labels: {{- include "ui.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "ui.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "ui.labels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.ui.image.pullSecret }}
      containers:
        - name: ui
          image: {{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}
          imagePullPolicy: Always
          env:
            - name: EDC_UI_MANAGEMENT_API_URL
              value: {{ include "ui.managementUrl" . }}
            - name: EDC_UI_CATALOG_URLS
              value: {{ include "ui.catalogUrl" . }}
{{- end }}